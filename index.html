<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Football Oracle · 私人足球運彩分析</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap');

  :root {
    --bg: #080c10;
    --surface: #0e1419;
    --surface2: #141c24;
    --border: #1e2d3d;
    --accent: #00e5a0;
    --accent2: #0099ff;
    --danger: #ff4757;
    --warn: #ffa502;
    --text: #e8f4f8;
    --text-dim: #6b8fa8;
    --text-muted: #3d5a72;
    --glow: rgba(0, 229, 160, 0.15);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Grotesk', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,229,160,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,229,160,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .container { max-width: 900px; margin: 0 auto; padding: 0 20px; position: relative; z-index: 1; }

  /* Header */
  header {
    padding: 28px 0 20px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 36px;
  }

  .header-inner {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .logo-mark {
    width: 36px; height: 36px;
    border: 1.5px solid var(--accent);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    color: var(--accent);
    letter-spacing: -1px;
  }

  .logo-text {
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 0.05em;
    color: var(--text);
  }

  .logo-sub {
    font-size: 11px;
    color: var(--text-muted);
    font-family: 'Space Mono', monospace;
    letter-spacing: 0.08em;
  }

  .status-badge {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    color: var(--accent);
    font-family: 'Space Mono', monospace;
    background: rgba(0,229,160,0.06);
    padding: 6px 12px;
    border-radius: 4px;
    border: 1px solid rgba(0,229,160,0.2);
  }

  .status-dot {
    width: 6px; height: 6px;
    background: var(--accent);
    border-radius: 50%;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  /* Match Input Panel */
  .input-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 28px;
    margin-bottom: 24px;
  }

  .panel-label {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.15em;
    color: var(--text-muted);
    margin-bottom: 20px;
    text-transform: uppercase;
  }

  .match-row {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    gap: 16px;
    align-items: end;
    margin-bottom: 20px;
  }

  .team-input-group { display: flex; flex-direction: column; gap: 8px; }

  .input-label {
    font-size: 11px;
    color: var(--text-dim);
    font-family: 'Space Mono', monospace;
    letter-spacing: 0.08em;
  }

  input[type="text"], select, textarea {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'Space Grotesk', sans-serif;
    font-size: 15px;
    padding: 12px 16px;
    width: 100%;
    transition: border-color 0.2s, box-shadow 0.2s;
    outline: none;
  }

  input[type="text"]:focus, select:focus, textarea:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--glow);
  }

  select { cursor: pointer; appearance: none; }

  .vs-divider {
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    color: var(--text-muted);
    padding-bottom: 14px;
    text-align: center;
  }

  .meta-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 20px;
  }

  .context-box {
    margin-bottom: 20px;
  }

  .context-box textarea {
    font-size: 13px;
    resize: vertical;
    min-height: 70px;
  }

  .analyze-btn {
    width: 100%;
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: 8px;
    padding: 14px;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.03em;
    transition: opacity 0.2s, transform 0.1s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .analyze-btn:hover { opacity: 0.9; }
  .analyze-btn:active { transform: scale(0.99); }
  .analyze-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* Result Panel */
  #result-panel {
    display: none;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    margin-bottom: 24px;
  }

  .result-header {
    background: var(--surface2);
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .result-match-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
  }

  .result-time {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--text-muted);
  }

  .verdict-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    border-bottom: 1px solid var(--border);
  }

  .verdict-item {
    padding: 20px 24px;
    border-right: 1px solid var(--border);
    text-align: center;
  }

  .verdict-item:last-child { border-right: none; }

  .verdict-label {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.12em;
    color: var(--text-muted);
    margin-bottom: 8px;
    text-transform: uppercase;
  }

  .verdict-value {
    font-size: 20px;
    font-weight: 700;
    color: var(--accent);
  }

  .verdict-value.warn { color: var(--warn); }
  .verdict-value.danger { color: var(--danger); }

  .verdict-sub {
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 4px;
  }

  /* Confidence bar */
  .confidence-section {
    padding: 20px 24px;
    border-bottom: 1px solid var(--border);
  }

  .conf-label {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.12em;
    color: var(--text-muted);
    margin-bottom: 10px;
    text-transform: uppercase;
    display: flex;
    justify-content: space-between;
  }

  .conf-track {
    height: 6px;
    background: var(--surface2);
    border-radius: 3px;
    overflow: hidden;
  }

  .conf-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent2), var(--accent));
    border-radius: 3px;
    transition: width 1s ease;
  }

  /* Analysis content */
  .analysis-body {
    padding: 24px;
  }

  .analysis-content {
    font-size: 14px;
    line-height: 1.8;
    color: var(--text-dim);
    white-space: pre-wrap;
  }

  .analysis-content strong {
    color: var(--text);
    font-weight: 600;
  }

  /* Loading state */
  .loading-indicator {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 24px;
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    color: var(--text-muted);
  }

  .loading-dots span {
    animation: blink 1.2s infinite;
    opacity: 0;
  }
  .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
  .loading-dots span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes blink {
    0%, 80%, 100% { opacity: 0; }
    40% { opacity: 1; }
  }

  /* History */
  #history-panel { margin-bottom: 40px; }

  .history-title {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.15em;
    color: var(--text-muted);
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  .history-list { display: flex; flex-direction: column; gap: 8px; }

  .history-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    cursor: pointer;
    transition: border-color 0.2s;
  }

  .history-item:hover { border-color: var(--text-muted); }

  .history-match { font-size: 13px; font-weight: 500; }

  .history-verdict {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--accent);
  }

  /* Disclaimer */
  .disclaimer {
    background: rgba(255,71,87,0.06);
    border: 1px solid rgba(255,71,87,0.2);
    border-radius: 8px;
    padding: 14px 18px;
    font-size: 12px;
    color: var(--text-dim);
    line-height: 1.6;
    margin-bottom: 40px;
  }

  .disclaimer strong { color: var(--danger); }

  @media (max-width: 600px) {
    .match-row { grid-template-columns: 1fr; }
    .vs-divider { padding-bottom: 0; }
    .meta-row { grid-template-columns: 1fr; }
    .verdict-row { grid-template-columns: 1fr; }
    .verdict-item { border-right: none; border-bottom: 1px solid var(--border); }
  }
</style>
</head>
<body>

<div class="container">
  <header>
    <div class="header-inner">
      <div class="logo">
        <div class="logo-mark">FO</div>
        <div>
          <div class="logo-text">Football Oracle</div>
          <div class="logo-sub">私人足球運彩分析系統</div>
        </div>
      </div>
      <div class="status-badge">
        <div class="status-dot"></div>
        AI 分析引擎運行中
      </div>
    </div>
  </header>

  <!-- Input Panel -->
  <div class="input-panel">
    <div class="panel-label">// 輸入賽事資訊</div>

    <div class="match-row">
      <div class="team-input-group">
        <span class="input-label">主隊 HOME</span>
        <input type="text" id="home-team" placeholder="例：墨西哥" />
      </div>
      <div class="vs-divider">VS</div>
      <div class="team-input-group">
        <span class="input-label">客隊 AWAY</span>
        <input type="text" id="away-team" placeholder="例：南非" />
      </div>
    </div>

    <div class="meta-row">
      <div>
        <span class="input-label" style="display:block;margin-bottom:8px;">賽事時間</span>
        <input type="text" id="match-time" placeholder="例：明天 03:00 AM" />
      </div>
      <div>
        <span class="input-label" style="display:block;margin-bottom:8px;">賽事類型</span>
        <select id="match-type">
          <option value="世界盃資格賽">世界盃資格賽</option>
          <option value="世界盃正賽">世界盃正賽</option>
          <option value="友誼賽">友誼賽</option>
          <option value="洲際盃">洲際盃</option>
          <option value="聯賽">聯賽</option>
        </select>
      </div>
    </div>

    <div class="context-box">
      <span class="input-label" style="display:block;margin-bottom:8px;">補充資訊（選填）— 例如：主力球員傷停、近期狀態</span>
      <textarea id="extra-context" placeholder="例：墨西哥中場主力因傷缺席，南非近3場無勝..."></textarea>
    </div>

    <button class="analyze-btn" id="analyze-btn" onclick="runAnalysis()">
      <span>⚡</span> 開始 AI 分析
    </button>
  </div>

  <!-- Result Panel -->
  <div id="result-panel">
    <div class="result-header">
      <span class="result-match-title" id="result-title">—</span>
      <span class="result-time" id="result-time">—</span>
    </div>

    <div id="loading-state" class="loading-indicator">
      <span>分析中</span>
      <span class="loading-dots"><span>.</span><span>.</span><span>.</span></span>
    </div>

    <div id="result-content" style="display:none;">
      <div class="verdict-row">
        <div class="verdict-item">
          <div class="verdict-label">建議投注</div>
          <div class="verdict-value" id="v-bet">—</div>
          <div class="verdict-sub" id="v-bet-sub">—</div>
        </div>
        <div class="verdict-item">
          <div class="verdict-label">預測比分</div>
          <div class="verdict-value warn" id="v-score">—</div>
          <div class="verdict-sub" id="v-score-sub">—</div>
        </div>
        <div class="verdict-item">
          <div class="verdict-label">風險評級</div>
          <div class="verdict-value danger" id="v-risk">—</div>
          <div class="verdict-sub" id="v-risk-sub">—</div>
        </div>
      </div>

      <div class="confidence-section">
        <div class="conf-label">
          <span>分析信心度</span>
          <span id="conf-pct">—</span>
        </div>
        <div class="conf-track">
          <div class="conf-fill" id="conf-fill" style="width:0%"></div>
        </div>
      </div>

      <div class="analysis-body">
        <div class="analysis-content" id="analysis-text"></div>
      </div>
    </div>
  </div>

  <!-- History -->
  <div id="history-panel" style="display:none;">
    <div class="history-title">// 今日分析記錄</div>
    <div class="history-list" id="history-list"></div>
  </div>

  <!-- Disclaimer -->
  <div class="disclaimer">
    <strong>⚠ 重要聲明：</strong> Football Oracle 提供的分析僅供參考，基於公開數據與 AI 推斷，不保證預測準確性。運動彩券涉及財務風險，請理性投注、量力而為。本平台不承擔任何投注損失責任。
  </div>
</div>

<script>
  const GEMINI_API_KEY = 'AIzaSyAQ.Ab8RN6KpDuajKq15ziPSPpxYpehGwC_aDJQT6-jM5iFrbb9CYg';
  const GEMINI_URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${GEMINI_API_KEY}`;

  const SYSTEM_PROMPT = `你是 Football Oracle，一個專業的足球賽事分析系統，專門協助用戶做運動彩券的參考分析。

你的回應必須嚴格遵守以下 JSON 格式，不能有任何額外文字，不能有markdown符號：
{
  "bet": "建議投注選項（例：主隊讓分 -1、客隊獲勝、和局、主隊不輸）",
  "bet_sub": "一句理由（15字以內）",
  "score": "預測比分（例：2:1）",
  "score_sub": "比分說明（10字以內）",
  "risk": "LOW / MED / HIGH",
  "risk_sub": "風險說明（10字以內）",
  "confidence": 數字（50到85之間的整數，代表信心百分比）,
  "analysis": "完整分析內容，約250-350字，繁體中文。包含：\n**近期狀態**\n主客隊近期表現分析...\n\n**歷史對戰**\n雙方交手紀錄趨勢...\n\n**關鍵因素**\n影響此場比賽的重要因素...\n\n**投注建議**\n最終建議及注意事項..."
}

分析原則：
- 基於足球專業知識、球隊排名、近期狀態進行合理推斷
- 信心度不要超過85%，保持誠實
- 風險評級：LOW=相對穩定、MED=有一定變數、HIGH=難以預測
- 分析要具體，提到實際的數據面向（即便是估算）
- 繁體中文回應，專業但易懂`;

  let history = [];

  async function runAnalysis() {
    const home = document.getElementById('home-team').value.trim();
    const away = document.getElementById('away-team').value.trim();
    const time = document.getElementById('match-time').value.trim();
    const type = document.getElementById('match-type').value;
    const extra = document.getElementById('extra-context').value.trim();

    if (!home || !away) {
      alert('請填入主隊與客隊名稱');
      return;
    }

    const btn = document.getElementById('analyze-btn');
    btn.disabled = true;
    btn.innerHTML = '<span>⏳</span> 分析中...';

    const resultPanel = document.getElementById('result-panel');
    resultPanel.style.display = 'block';
    document.getElementById('loading-state').style.display = 'flex';
    document.getElementById('result-content').style.display = 'none';

    document.getElementById('result-title').textContent = `${home} vs ${away}`;
    document.getElementById('result-time').textContent = time || type;

    const userPrompt = `請分析以下足球賽事：
主隊：${home}
客隊：${away}
賽事時間：${time || '未指定'}
賽事類型：${type}
${extra ? `補充資訊：${extra}` : ''}

請根據這場比賽的球隊特性、近期狀態、歷史對戰紀錄給出分析與投注建議。`;

    try {
      const response = await fetch(GEMINI_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          contents: [{ parts: [{ text: SYSTEM_PROMPT + '\n\n' + userPrompt }] }],
          generationConfig: { temperature: 0.7, maxOutputTokens: 1500 }
        })
      });

      const data = await response.json();
      const raw = data.candidates?.[0]?.content?.parts?.[0]?.text || '';

      let result;
      try {
        const clean = raw.replace(/```json|```/g, '').trim();
        result = JSON.parse(clean);
      } catch {
        throw new Error('解析回應失敗');
      }

      renderResult(result, home, away);

      history.unshift({ home, away, bet: result.bet, time: new Date().toLocaleTimeString('zh-TW', {hour:'2-digit', minute:'2-digit'}) });
      renderHistory();

    } catch (err) {
      document.getElementById('loading-state').innerHTML = `<span style="color:var(--danger)">分析失敗，請重試。(${err.message})</span>`;
    } finally {
      btn.disabled = false;
      btn.innerHTML = '<span>⚡</span> 開始 AI 分析';
    }
  }

  function renderResult(r, home, away) {
    document.getElementById('loading-state').style.display = 'none';
    document.getElementById('result-content').style.display = 'block';

    document.getElementById('v-bet').textContent = r.bet;
    document.getElementById('v-bet-sub').textContent = r.bet_sub;
    document.getElementById('v-score').textContent = r.score;
    document.getElementById('v-score-sub').textContent = r.score_sub;

    const riskEl = document.getElementById('v-risk');
    riskEl.textContent = r.risk === 'LOW' ? '低' : r.risk === 'MED' ? '中' : '高';
    riskEl.className = 'verdict-value ' + (r.risk === 'LOW' ? '' : r.risk === 'MED' ? 'warn' : 'danger');
    document.getElementById('v-risk-sub').textContent = r.risk_sub;

    const pct = Math.min(85, Math.max(50, r.confidence));
    document.getElementById('conf-pct').textContent = pct + '%';
    setTimeout(() => {
      document.getElementById('conf-fill').style.width = pct + '%';
    }, 100);

    // Render formatted analysis
    const analysisEl = document.getElementById('analysis-text');
    let formatted = r.analysis
      .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
      .replace(/\n/g, '<br>');
    analysisEl.innerHTML = formatted;
  }

  function renderHistory() {
    const panel = document.getElementById('history-panel');
    const list = document.getElementById('history-list');
    if (history.length === 0) { panel.style.display = 'none'; return; }
    panel.style.display = 'block';
    list.innerHTML = history.map(h => `
      <div class="history-item">
        <span class="history-match">${h.home} vs ${h.away}</span>
        <span class="history-verdict">${h.bet} · ${h.time}</span>
      </div>
    `).join('');
  }

  // Enter key support
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter' && e.ctrlKey) runAnalysis();
  });
</script>
</body>
</html>
